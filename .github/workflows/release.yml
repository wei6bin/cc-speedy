name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: cc-speedy
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: cc-speedy
          - os: macos-13
            target: x86_64-apple-darwin
            binary: cc-speedy

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${BASE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          ARTIFACT=cc-speedy-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} "$ARTIFACT"
          tar czf "${ARTIFACT}.tar.gz" "$ARTIFACT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-speedy-${{ matrix.target }}
          path: cc-speedy-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${BASE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            cc-speedy-x86_64-unknown-linux-musl.tar.gz
            cc-speedy-aarch64-apple-darwin.tar.gz
            cc-speedy-x86_64-apple-darwin.tar.gz
